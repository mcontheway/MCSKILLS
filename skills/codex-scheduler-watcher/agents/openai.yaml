interface:
  display_name: "调度线程编排"
  short_description: "创建维护 scheduler lifecycle、scheduler pool 和 shared lane locks"
  default_prompt: "使用 $codex-scheduler-watcher 创建或更新 meta-scheduler watcher automation：默认中文输出，并为机器字段保留英文；为 milestone、parent issue、issue set、PR/PR set、repo carrier 或手工目标维护 coordination unit graph、candidate graph、scheduler pool、shared lane lock table 和 waiting queue；按 dependency edge 做 partial-order scheduling，未满足 hard dependency 只阻塞消费它的 scoped subset；在证明候选 scope 可启动、容量、可观测性和 lane budget 足够时并行创建 implementation-only scheduler；进入 shared carrier/status/review/gate/merge/contract lane 前必须由 watcher 发 lane_grant；watcher 只管理调度线程生命周期、unit cursor 和 lane grant/wait/release，不调度 worker、不运行 gate、不合并 PR；所有 watcher 输出必须包含中文 human_summary，且 next_owner=watcher 时必须先执行动作再总结。"
