interface:
  display_name: "调度器守望"
  short_description: "创建维护 scheduler 生命周期的 meta-scheduler watcher"
  default_prompt: "使用 $codex-scheduler-watcher 创建或更新 meta-scheduler watcher automation：默认中文输出，为 milestone、parent issue、issue set、PR/PR set、repo carrier 或手工目标维护 coordination unit graph 和 scheduler pool；在证明独立、容量和可观测性足够时并行创建多个 scheduler thread；watcher 只管理 scheduler 生命周期和 unit cursor，不调度 worker、不运行 gate、不合并 PR。"
